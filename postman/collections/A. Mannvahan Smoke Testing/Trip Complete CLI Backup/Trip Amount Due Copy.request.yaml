$kind: http-request
url: "{{baseUrl}}/trips_new/{{cTripId}}/amount_due"
method: GET
headers:
  Authorization: "{{cDriver_Token}}"
  Content-Type: application/json
scripts:
  - type: afterResponse
    code: "// ==========================================\r

      // PARSE RESPONSE\r

      // ==========================================\r

      \r

      const response = pm.response.json();\r

      \r

      \r

      pm.collectionVariables.set(\r

      \        \"cAmountDue\",\r

      \        response.data.amountDue\r

      \    );\r

      \r

      \r

      \r

      // ==========================================\r

      // COMMON UUID REGEX\r

      // ==========================================\r

      \r

      const uuidRegex =\r

      /^[0-9a-f]{8}-[0-9a-f]{4}-[1-5][0-9a-f]{3}-[89ab][0-9a-f]{3}-[0-9a-f]{12}$/i;\r

      \r

      \r

      // ==========================================\r

      // BASIC RESPONSE VALIDATION\r

      // ==========================================\r

      \r

      pm.test(\"Status code should be 200\", function () {\r

      \r

      \    pm.expect(response.statusCode)\r

      \        .to.eql(200);\r

      \r

      });\r

      \r

      pm.test(\"Success should be true\", function () {\r

      \r

      \    pm.expect(response.success)\r

      \        .to.eql(true);\r

      \r

      });\r

      \r

      pm.test(\"Success should be Boolean\", function () {\r

      \r

      \    pm.expect(response.success)\r

      \        .to.be.a(\"boolean\");\r

      \r

      });\r

      \r

      pm.test(\"Data should be Object\", function () {\r

      \r

      \    pm.expect(response.data)\r

      \        .to.be.an(\"object\");\r

      \r

      });\r

      \r

      pm.test(\"Error should be null\", function () {\r

      \r

      \    pm.expect(response.error)\r

      \        .to.eql(null);\r

      \r

      });\r

      \r

      \r

      // ==========================================\r

      // PAYMENT DUE VALIDATION\r

      // ==========================================\r

      \r

      pm.test(\"Trip ID should be valid UUID\", function () {\r

      \r

      \    pm.expect(response.data.id)\r

      \        .to.match(uuidRegex);\r

      \r

      });\r

      \r

      pm.test(\"AmountDue should be Number\", function () {\r

      \r

      \    pm.expect(response.data.amountDue)\r

      \        .to.be.a(\"number\");\r

      \r

      });\r

      \r

      pm.test(\"AmountDue should be greater than 0\", function () {\r

      \r

      \    pm.expect(response.data.amountDue)\r

      \        .to.be.above(0);\r

      \r

      });\r

      \r

      pm.test(\"AmountDue should not be null\", function () {\r

      \r

      \    pm.expect(response.data.amountDue)\r

      \        .to.not.eql(null);\r

      \r

      });\r

      \r

      pm.test(\"AmountDue should be equal to expected fare\", function () {\r

      \r

      \    pm.expect(response.data.amountDue)\r

      \        .to.eql(11750);\r

      \r

      });\r

      \r

      \r

      // ==========================================\r

      // BUSINESS LOGIC VALIDATION\r

      // ==========================================\r

      \r

      pm.test(\"AmountDue should be valid currency value\", function () {\r

      \r

      \    pm.expect(response.data.amountDue % 1)\r

      \        .to.eql(0);\r

      \r

      });\r

      \r

      pm.test(\"Trip should have pending payable amount\", function () {\r

      \r

      \    pm.expect(response.data.amountDue)\r

      \        .to.be.greaterThan(0);\r

      \r

      });\r

      \r

      \r

      // ==========================================\r

      // PERFORMANCE VALIDATION\r

      // ==========================================\r

      \r

      pm.test(\"Response time should be below 3000ms\", function () {\r

      \r

      \    pm.expect(pm.response.responseTime)\r

      \        .to.be.below(3000);\r

      \r

      });"
    language: text/javascript
order: 9000
