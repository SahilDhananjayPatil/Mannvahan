      \r

      \r

      // ==========================================\r

      // TRIP VALIDATION\r

      // ==========================================\r

      \r

      pm.test(\"Trip ID should be valid UUID\", function () {\r

      \r

      \    pm.expect(response.data.id)\r

      \        .to.match(uuidRegex);\r

      \r

      });\r

      \r

      pm.test(\"Trip status should be COMPLETED\", function () {\r

      \r

      \    pm.expect(response.data.status)\r

      \        .to.eql(\"COMPLETED\");\r

      \r

      });\r

      \r

      pm.test(\"Trip active should be false\", function () {\r

      \r

      \    pm.expect(response.data.active)\r

      \        .to.eql(false);\r

      \r

