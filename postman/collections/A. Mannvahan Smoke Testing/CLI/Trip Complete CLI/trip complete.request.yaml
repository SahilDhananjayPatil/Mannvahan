      });\r

      \r

      \r

      // ==========================================\r

      // DATETIME VALIDATION\r

      // ==========================================\r

      \r

      pm.test(\"CreatedAtIST should be valid datetime\", function () {\r

      \r

      \    pm.expect(\r

      \        Date.parse(response.data.createdAtIST)\r

      \    ).to.not.be.NaN;\r

      \r

      });\r

      \r

      pm.test(\"UpdatedAtIST should be valid datetime\", function () {\r

      \r

      \    pm.expect(\r

      \        Date.parse(response.data.updatedAtIST)\r

      \    ).to.not.be.NaN;\r

      \r

      });\r

      \r

      \r

      // ==========================================\r

      // BUSINESS LOGIC VALIDATION\r

      // ==========================================\r

      \r

      pm.test(\"COMPLETED trip should have driver assigned\", function () {\r

      \r

      \    if (response.data.status === \"COMPLETED\") {\r

      \r

      \        pm.expect(response.data.driver)\r

      \            .to.not.eql(null);\r

      \    }\r

      \r

      });\r

      \r

      pm.test(\"COMPLETED trip should have pickedTime\", function () {\r

      \r

      \    if (response.data.status === \"COMPLETED\") {\r

      \r

      \        pm.expect(response.data.pickedTime)\r

      \            .to.not.eql(null);\r

      \    }\r

      \r

      });\r

      \r

      pm.test(\"COMPLETED trip should have droppedTime\", function () {\r

      \r

      \    if (response.data.status === \"COMPLETED\") {\r

      \r

      \        pm.expect(response.data.droppedTime)\r

      \            .to.not.eql(null);\r

      \    }\r

      \r

      });\r

      \r

      pm.test(\"COMPLETED trip should have tripFare\", function () {\r

      \r

      \    if (response.data.status === \"COMPLETED\") {\r

      \r

      \        pm.expect(response.data.tripFare)\r

      \            .to.not.eql(null);\r

      \    }\r

      \r

      });\r

      \r

      pm.test(\"Completed trip should be inactive\", function () {\r

      \r

      \    if (response.data.status === \"COMPLETED\") {\r

      \r

      \        pm.expect(response.data.active)\r

      \            .to.eql(false);\r

      \    }\r

      \r

      });\r

      \r

      pm.test(\"DroppedTime should be after PickedTime\", function () {\r

      \r

      \    const pickedTime =\r

      \        new Date(response.data.pickedTime);\r

      \r

      \    const droppedTime =\r

