      \r

      \r

      // ==========================================\r

      // BASIC RESPONSE VALIDATION\r

      // ==========================================\r

      \r

      pm.test(\"Status code should be 200\", function () {\r

      \r

      \    pm.expect(response.statusCode)\r

      \        .to.eql(200);\r

      \r

      });\r

      \r

      pm.test(\"Success should be true\", function () {\r

      \r

      \    pm.expect(response.success)\r

      \        .to.eql(true);\r

      \r

      });\r

      \r

      pm.test(\"Success should be Boolean\", function () {\r

      \r

      \    pm.expect(response.success)\r

      \        .to.be.a(\"boolean\");\r

      \r

      });\r

      \r

      pm.test(\"Data should be Object\", function () {\r

      \r

      \    pm.expect(response.data)\r

      \        .to.be.an(\"object\");\r

      \r

      });\r

      \r

      pm.test(\"Error should be null\", function () {\r

      \r

      \    pm.expect(response.error)\r

      \        .to.eql(null);\r

      \r

