$kind: http-request
url: "{{baseUrl}}/trips_new/{{cTripId}}/status"
method: GET
headers:
  Content-Type: application/json
  Authorization: "{{cDriver_Token}}"
body:
  type: json
  content: |-
    {
        "status": "MATCHED"
    }
scripts:
  - type: afterResponse
    code: "pm.test(\"Status code should be 200\", function () {\r

      \    pm.response.to.have.status(200);\r

      });\r

      \r

      pm.test(\"Response time should be below 2000ms\", function () {\r

      \    pm.expect(pm.response.responseTime).to.be.below(2000);\r

      });\r

      \r

      pm.test(\"Response should be in JSON format\", function () {\r

      \    pm.response.to.be.json;\r

      });\r

      \r

      pm.test(\"Success flag should be true\", function () {\r

      \    var jsonData = pm.response.json();\r

      \r

      \    pm.expect(jsonData.success).to.eql(true);\r

      });\r

      \r

      pm.test(\"Status code in response body should be 200\", function () {\r

      \    var jsonData = pm.response.json();\r

      \r

      \    pm.expect(jsonData.statusCode).to.eql(200);\r

      });\r

      \r

      pm.test(\"Error object should be null\", function () {\r

      \    var jsonData = pm.response.json();\r

      \r

      \    pm.expect(jsonData.error).to.eql(null);\r

      });\r

      \r

      pm.test(\"Data object should exist\", function () {\r

      \    var jsonData = pm.response.json();\r

      \r

      \    pm.expect(jsonData.data).to.not.be.null;\r

      });\r

      \r

      pm.test(\"Driver ID should exist\", function () {\r

      \    var jsonData = pm.response.json();\r

      \r

      \    pm.expect(jsonData.data.id).to.exist;\r

      });\r

      \r

      pm.test(\"Driver ID should not be empty\", function () {\r

      \    var jsonData = pm.response.json();\r

      \r

      \    pm.expect(jsonData.data.id).to.not.eql(\"\");\r

      });\r

      \r

      pm.test(\"Driver status should be ARRIVED\", function () {\r

      \    var jsonData = pm.response.json();\r

      \r

      \    pm.expect(jsonData.data.status).to.eql(\"ARRIVED\");\r

      });\r

      \r

      pm.test(\"Driver status should not be null\", function () {\r

      \    var jsonData = pm.response.json();\r

      \r

      \    pm.expect(jsonData.data.status).to.not.be.null;\r

      });\r

      \r

      pm.test(\"Response should contain expected keys\", function () {\r

      \    var jsonData = pm.response.json();\r

      \r

      \    pm.expect(jsonData).to.have.property(\"success\");\r

      \    pm.expect(jsonData).to.have.property(\"statusCode\");\r

      \    pm.expect(jsonData).to.have.property(\"data\");\r

      \    pm.expect(jsonData).to.have.property(\"error\");\r

      });\r

      \r

      pm.test(\"Data object should contain id and status\", function () {\r

      \    var jsonData = pm.response.json();\r

      \r

      \    pm.expect(jsonData.data).to.have.property(\"id\");\r

      \    pm.expect(jsonData.data).to.have.property(\"status\");\r

      });"
    language: text/javascript
order: 6000
