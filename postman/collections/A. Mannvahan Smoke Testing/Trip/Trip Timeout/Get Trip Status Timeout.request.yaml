$kind: http-request
url: "{{baseUrl}}/trips_new/{{cTripId}}/status"
method: GET
headers:
  Content-Type: application/json
  Authorization: "{{cDriver_Token}}"
body:
  type: json
  content: |-
    {
        "status": "MATCHED"
    }
scripts:
  - type: afterResponse
    code: "// =====================================\r

      // CONVERT RESPONSE TO JSON\r

      // =====================================\r

      const response = pm.response.json();\r

      \r

      \r

      // =====================================\r

      // SAVE COLLECTION VARIABLE\r

      // =====================================\r

      if (response.data) {\r

      \r

      \    pm.collectionVariables.set(\r

      \        \"tripId\",\r

      \        response.data.id\r

      \    );\r

      \r

      }\r

      \r

      \r

      // =====================================\r

      // STATUS CODE VALIDATION\r

      // =====================================\r

      pm.test(\"Status code should be 200\", function () {\r

      \r

      \    pm.response.to.have.status(200);\r

      \r

      });\r

      \r

      \r

      // =====================================\r

      // BASIC RESPONSE VALIDATION\r

      // =====================================\r

      pm.test(\"success should be true\", function () {\r

      \r

      \    pm.expect(response.success)\r

      \        .to.eql(true);\r

      \r

      });\r

      \r

      pm.test(\"statusCode should be 200\", function () {\r

      \r

      \    pm.expect(response.statusCode)\r

      \        .to.eql(200);\r

      \r

      });\r

      \r

      pm.test(\"error should be null\", function () {\r

      \r

      \    pm.expect(response.error)\r

      \        .to.eql(null);\r

      \r

      });\r

      \r

      \r

      // =====================================\r

      // DATA OBJECT VALIDATION\r

      // =====================================\r

      pm.test(\"data object should exist\", function () {\r

      \r

      \    pm.expect(response.data)\r

      \        .to.not.be.null;\r

      \r

      });\r

      \r

      pm.test(\"data should be an object\", function () {\r

      \r

      \    pm.expect(response.data)\r

      \        .to.be.an(\"object\");\r

      \r

      });\r

      \r

      \r

      // =====================================\r

      // ID VALIDATION\r

      // =====================================\r

      pm.test(\"Trip ID should exist\", function () {\r

      \r

      \    pm.expect(response.data.id)\r

      \        .to.not.be.undefined;\r

      \r

      });\r

      \r

      pm.test(\"Trip ID should be string\", function () {\r

      \r

      \    pm.expect(response.data.id)\r

      \        .to.be.a(\"string\");\r

      \r

      });\r

      \r

      pm.test(\"Trip ID should not be empty\", function () {\r

      \r

      \    pm.expect(response.data.id.length)\r

      \        .to.be.above(0);\r

      \r

      });\r

      \r

      \r

      // =====================================\r

      // STATUS VALIDATION\r

      // =====================================\r

      pm.test(\"Trip status should be TIMED_OUT\", function () {\r

      \r

      \    pm.expect(response.data.status)\r

      \        .to.eql(\"TIMED_OUT\");\r

      \r

      });\r

      \r

      pm.test(\"Trip status should be string\", function () {\r

      \r

      \    pm.expect(response.data.status)\r

      \        .to.be.a(\"string\");\r

      \r

      });\r

      \r

      \r

      // =====================================\r

      // SCHEMA VALIDATION\r

      // =====================================\r

      pm.test(\"Response schema should be valid\", function () {\r

      \r

      \    const schema = {\r

      \r

      \        type: \"object\",\r

      \r

      \        required: [\r

      \            \"success\",\r

      \            \"statusCode\",\r

      \            \"data\",\r

      \            \"error\"\r

      \        ],\r

      \r

      \        properties: {\r

      \r

      \            success: {\r

      \                type: \"boolean\"\r

      \            },\r

      \r

      \            statusCode: {\r

      \                type: \"number\"\r

      \            },\r

      \r

      \            data: {\r

      \r

      \                type: \"object\",\r

      \r

      \                required: [\r

      \                    \"id\",\r

      \                    \"status\"\r

      \                ],\r

      \r

      \                properties: {\r

      \r

      \                    id: {\r

      \                        type: \"string\"\r

      \                    },\r

      \r

      \                    status: {\r

      \                        type: \"string\"\r

      \                    }\r

      \r

      \                }\r

      \r

      \            },\r

      \r

      \            error: {\r

      \                type: [\"null\"]\r

      \            }\r

      \r

      \        }\r

      \r

      \    };\r

      \r

      \    pm.response.to.have.jsonSchema(schema);\r

      \r

      });\r

      \r

      \r

      // =====================================\r

      // HEADER VALIDATION\r

      // =====================================\r

      pm.test(\"Content-Type should be application/json\", function () {\r

      \r

      \    pm.expect(\r

      \        pm.response.headers.get(\"Content-Type\")\r

      \    ).to.include(\"application/json\");\r

      \r

      });\r

      \r

      \r

      // =====================================\r

      // RESPONSE TIME VALIDATION\r

      // =====================================\r

      pm.test(\"Response time should be below 3000ms\", function () {\r

      \r

      \    pm.expect(pm.response.responseTime)\r

      \        .to.be.below(3000);\r

      \r

      });\r

      \r

      \r

      // =====================================\r

      // BUSINESS LOGIC VALIDATION\r

      // =====================================\r

      pm.test(\"Trip should be timed out successfully\", function () {\r

      \r

      \    if (response.data.status === \"TIMED_OUT\") {\r

      \r

      \        pm.expect(response.success)\r

      \            .to.eql(true);\r

      \r

      \    }\r

      \r

      });\r

      \r

      pm.test(\"TIMED_OUT trip should have valid ID\", function () {\r

      \r

      \    pm.expect(response.data.id)\r

      \        .to.match(\r

      \            /^[0-9a-fA-F-]{36}$/\r

      \        );\r

      \r

      });\r

      \r

      pm.test(\"Status should exactly match TIMED_OUT\", function () {\r

      \r

      \    pm.expect(response.data.status)\r

      \        .to.equal(\"TIMED_OUT\");\r

      \r

      });"
    language: text/javascript
  - type: beforeRequest
    code: "console.log(\"get trip status for trip id: \", pm.collectionVariables.get(\"tripId\"))\r

      \r

      console.log(\"waiting for 2 min to timeout trip \")\r

      // Wait for 2 minutes (120000 milliseconds)\r

      setTimeout(() => {\r

      \    console.log(\"2 minutes completed\");\r

      }, 120000);"
    language: text/javascript
order: 5000
