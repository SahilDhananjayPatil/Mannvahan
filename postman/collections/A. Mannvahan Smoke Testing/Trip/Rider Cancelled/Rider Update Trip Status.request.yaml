$kind: http-request
url: "{{baseUrl}}/trips_new/{{cTripId}}/status"
method: PUT
headers:
  Authorization: "{{RIDER_TOKEN}}"
  Content-Type: application/json
body:
  type: json
  content: |-
    {
        "status": "CANCELLED"
    }
scripts:
  - type: afterResponse
    code: "// =====================================\r

      // CONVERT RESPONSE TO JSON\r

      // =====================================\r

      const response = pm.response.json();\r

      \r

      \r

      // =====================================\r

      // SAVE VARIABLES\r

      // =====================================\r

      if (response.data) {\r

      \r

      \    pm.environment.set(\"tripId\", response.data.id);\r

      \r

      \    if (response.data.tripRequestNew) {\r

      \        pm.environment.set(\r

      \            \"tripRequestId\",\r

      \            response.data.tripRequestNew.id\r

      \        );\r

      \    }\r

      \r

      \    if (response.data.fareEstimateNew) {\r

      \        pm.environment.set(\r

      \            \"fareEstimateId\",\r

      \            response.data.fareEstimateNew.id\r

      \        );\r

      \    }\r

      \r

      \    if (response.data.rider) {\r

      \        pm.environment.set(\r

      \            \"riderId\",\r

      \            response.data.rider.id\r

      \        );\r

      \    }\r

      }\r

      \r

      \r

      // =====================================\r

      // STATUS CODE VALIDATION\r

      // =====================================\r

      pm.test(\"Status code should be 200\", function () {\r

      \r

      \    pm.response.to.have.status(200);\r

      \r

      });\r

      \r

      \r

      // =====================================\r

      // BASIC RESPONSE VALIDATION\r

      // =====================================\r

      pm.test(\"success should be true\", function () {\r

      \r

      \    pm.expect(response.success)\r

      \        .to.eql(true);\r

      \r

      });\r

      \r

      pm.test(\"statusCode should be 200\", function () {\r

      \r

      \    pm.expect(response.statusCode)\r

      \        .to.eql(200);\r

      \r

      });\r

      \r

      pm.test(\"error should be null\", function () {\r

      \r

      \    pm.expect(response.error)\r

      \        .to.eql(null);\r

      \r

      });\r

      \r

      \r

      // =====================================\r

      // DATA OBJECT VALIDATION\r

      // =====================================\r

      pm.test(\"data object should exist\", function () {\r

      \r

      \    pm.expect(response.data)\r

      \        .to.not.be.null;\r

      \r

      });\r

      \r

      pm.test(\"data should be object\", function () {\r

      \r

      \    pm.expect(response.data)\r

      \        .to.be.an(\"object\");\r

      \r

      });\r

      \r

      \r

      // =====================================\r

      // MAIN TRIP VALIDATION\r

      // =====================================\r

      pm.test(\"Trip ID should exist\", function () {\r

      \r

      \    pm.expect(response.data.id)\r

      \        .to.not.be.undefined;\r

      \r

      });\r

      \r

      pm.test(\"Trip ID should be string\", function () {\r

      \r

      \    pm.expect(response.data.id)\r

      \        .to.be.a(\"string\");\r

      \r

      });\r

      \r

      pm.test(\"Trip status should be CANCELLED\", function () {\r

      \r

      \    pm.expect(response.data.status)\r

      \        .to.eql(\"CANCELLED\");\r

      \r

      });\r

      \r

      pm.test(\"Trip active should be false\", function () {\r

      \r

      \    pm.expect(response.data.active)\r

      \        .to.eql(false);\r

      \r

      });\r

      \r

      \r

      // =====================================\r

      // TRIP REQUEST VALIDATION\r

      // =====================================\r

      pm.test(\"tripRequestNew should exist\", function () {\r

      \r

      \    pm.expect(response.data.tripRequestNew)\r

      \        .to.not.be.null;\r

      \r

      });\r

      \r

      pm.test(\"Trip request ID should exist\", function () {\r

      \r

      \    pm.expect(response.data.tripRequestNew.id)\r

      \        .to.not.be.undefined;\r

      \r

      });\r

      \r

      pm.test(\"Vehicle type should be AUTO\", function () {\r

      \r

      \    pm.expect(response.data.tripRequestNew.vehicleType)\r

      \        .to.eql(\"AUTO\");\r

      \r

      });\r

      \r

      pm.test(\"Estimated distance should be number\", function () {\r

      \r

      \    pm.expect(response.data.tripRequestNew.estimatedDistance)\r

      \        .to.be.a(\"number\");\r

      \r

      });\r

      \r

      pm.test(\"Estimated time should be number\", function () {\r

      \r

      \    pm.expect(response.data.tripRequestNew.estimatedTime)\r

      \        .to.be.a(\"number\");\r

      \r

      });\r

      \r

      \r

      // =====================================\r

      // START ADDRESS VALIDATION\r

      // =====================================\r

      pm.test(\"Start address should exist\", function () {\r

      \r

      \    pm.expect(\r

      \        response.data.tripRequestNew.startAddress\r

      \    ).to.not.be.null;\r

      \r

      });\r

      \r

      pm.test(\"Start latitude should be valid\", function () {\r

      \r

      \    const lat = response.data.tripRequestNew\r

      \        .startAddress.geoLocation.lat;\r

      \r

      \    pm.expect(lat).to.be.within(-90, 90);\r

      \r

      });\r

      \r

      pm.test(\"Start longitude should be valid\", function () {\r

      \r

      \    const lng = response.data.tripRequestNew\r

      \        .startAddress.geoLocation.lng;\r

      \r

      \    pm.expect(lng).to.be.within(-180, 180);\r

      \r

      });\r

      \r

      \r

      // =====================================\r

      // END ADDRESS VALIDATION\r

      // =====================================\r

      pm.test(\"End address should exist\", function () {\r

      \r

      \    pm.expect(\r

      \        response.data.tripRequestNew.endAddress\r

      \    ).to.not.be.null;\r

      \r

      });\r

      \r

      pm.test(\"End latitude should be valid\", function () {\r

      \r

      \    const lat = response.data.tripRequestNew\r

      \        .endAddress.geoLocation.lat;\r

      \r

      \    pm.expect(lat).to.be.within(-90, 90);\r

      \r

      });\r

      \r

      pm.test(\"End longitude should be valid\", function () {\r

      \r

      \    const lng = response.data.tripRequestNew\r

      \        .endAddress.geoLocation.lng;\r

      \r

      \    pm.expect(lng).to.be.within(-180, 180);\r

      \r

      });\r

      \r

      \r

      // =====================================\r

      // FARE ESTIMATE VALIDATION\r

      // =====================================\r

      pm.test(\"fareEstimateNew should exist\", function () {\r

      \r

      \    pm.expect(response.data.fareEstimateNew)\r

      \        .to.not.be.null;\r

      \r

      });\r

      \r

      pm.test(\"Fare estimate ID should exist\", function () {\r

      \r

      \    pm.expect(response.data.fareEstimateNew.id)\r

      \        .to.not.be.undefined;\r

      \r

      });\r

      \r

      pm.test(\"Minimum fare should be number\", function () {\r

      \r

      \    pm.expect(response.data.fareEstimateNew.minEstimatedFare)\r

      \        .to.be.a(\"number\");\r

      \r

      });\r

      \r

      pm.test(\"Maximum fare should be number\", function () {\r

      \r

      \    pm.expect(response.data.fareEstimateNew.maxEstimatedFare)\r

      \        .to.be.a(\"number\");\r

      \r

      });\r

      \r

      pm.test(\"Maximum fare should be >= minimum fare\", function () {\r

      \r

      \    const minFare =\r

      \        response.data.fareEstimateNew.minEstimatedFare;\r

      \r

      \    const maxFare =\r

      \        response.data.fareEstimateNew.maxEstimatedFare;\r

      \r

      \    pm.expect(maxFare)\r

      \        .to.be.at.least(minFare);\r

      \r

      });\r

      \r

      \r

      // =====================================\r

      // RIDER VALIDATION\r

      // =====================================\r

      pm.test(\"Rider object should exist\", function () {\r

      \r

      \    pm.expect(response.data.rider)\r

      \        .to.not.be.null;\r

      \r

      });\r

      \r

      pm.test(\"Rider ID should exist\", function () {\r

      \r

      \    pm.expect(response.data.rider.id)\r

      \        .to.not.be.undefined;\r

      \r

      });\r

      \r

      pm.test(\"Rider rating should be number\", function () {\r

      \r

      \    pm.expect(response.data.rider.rating)\r

      \        .to.be.a(\"number\");\r

      \r

      });\r

      \r

      pm.test(\"Total rides should be number\", function () {\r

      \r

      \    pm.expect(response.data.rider.totalRides)\r

      \        .to.be.a(\"number\");\r

      \r

      });\r

      \r

      \r

      // =====================================\r

      // NULL FIELD VALIDATION\r

      // =====================================\r

      pm.test(\"Driver should be null\", function () {\r

      \r

      \    pm.expect(response.data.driver)\r

      \        .to.eql(null);\r

      \r

      });\r

      \r

      pm.test(\"Trip fare should be null\", function () {\r

      \r

      \    pm.expect(response.data.tripFare)\r

      \        .to.eql(null);\r

      \r

      });\r

      \r

      pm.test(\"Driver start address should be null\", function () {\r

      \r

      \    pm.expect(response.data.driverStartAddress)\r

      \        .to.eql(null);\r

      \r

      });\r

      \r

      \r

      // =====================================\r

      // TIME FIELD VALIDATION\r

      // =====================================\r

      pm.test(\"Actual time should be number\", function () {\r

      \r

      \    pm.expect(response.data.actualTime)\r

      \        .to.be.a(\"number\");\r

      \r

      });\r

      \r

      pm.test(\"Actual first mile should be number\", function () {\r

      \r

      \    pm.expect(response.data.actualFirstMile)\r

      \        .to.be.a(\"number\");\r

      \r

      });\r

      \r

      \r

      // =====================================\r

      // DATE VALIDATION\r

      // =====================================\r

      pm.test(\"createdAtIST should exist\", function () {\r

      \r

      \    pm.expect(response.data.createdAtIST)\r

      \        .to.not.be.null;\r

      \r

      });\r

      \r

      pm.test(\"updatedAtIST should exist\", function () {\r

      \r

      \    pm.expect(response.data.updatedAtIST)\r

      \        .to.not.be.null;\r

      \r

      });\r

      \r

      \r

      // =====================================\r

      // HEADER VALIDATION\r

      // =====================================\r

      pm.test(\"Content-Type should be application/json\", function () {\r

      \r

      \    pm.expect(\r

      \        pm.response.headers.get(\"Content-Type\")\r

      \    ).to.include(\"application/json\");\r

      \r

      });\r

      \r

      \r

      // =====================================\r

      // RESPONSE TIME VALIDATION\r

      // =====================================\r

      pm.test(\"Response time should be below 3000ms\", function () {\r

      \r

      \    pm.expect(pm.response.responseTime)\r

      \        .to.be.below(3000);\r

      \r

      });\r

      \r

      \r

      // =====================================\r

      // BUSINESS LOGIC VALIDATION\r

      // =====================================\r

      pm.test(\"Cancelled trip should not be active\", function () {\r

      \r

      \    if (response.data.status === \"CANCELLED\") {\r

      \r

      \        pm.expect(response.data.active)\r

      \            .to.eql(false);\r

      \r

      \    }\r

      \r

      });\r

      \r

      pm.test(\"Cancelled trip should not have assigned driver\", function () {\r

      \r

      \    if (response.data.status === \"CANCELLED\") {\r

      \r

      \        pm.expect(response.data.driver)\r

      \            .to.eql(null);\r

      \r

      \    }\r

      \r

      });\r

      \r

      pm.test(\"Cancelled trip should not have trip fare\", function () {\r

      \r

      \    if (response.data.status === \"CANCELLED\") {\r

      \r

      \        pm.expect(response.data.tripFare)\r

      \            .to.eql(null);\r

      \r

      \    }\r

      \r

      });"
    language: text/javascript
examples: ./.resources/Rider Update Trip Status.resources/examples
order: 4000
