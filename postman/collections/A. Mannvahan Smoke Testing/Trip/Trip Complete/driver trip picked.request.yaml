$kind: http-request
url: "{{baseUrl}}/trips_new/{{cTripId}}/status"
method: PUT
headers:
  Authorization: "{{cDriver_Token}}"
  Content-Type: application/json
body:
  type: json
  content: |-
    {
        // "status": "ACCEPTED"
        // "status": "PICKED"
        // "status": "DROPPED"
        "status": "PICKED"
      }
scripts:
  - type: afterResponse
    code: "// ==========================================\r

      // PARSE RESPONSE\r

      // ==========================================\r

      \r

      const response = pm.response.json();\r

      \r

      \r

      // ==========================================\r

      // COMMON UUID REGEX\r

      // ==========================================\r

      \r

      const uuidRegex =\r

      /^[0-9a-f]{8}-[0-9a-f]{4}-[1-5][0-9a-f]{3}-[89ab][0-9a-f]{3}-[0-9a-f]{12}$/i;\r

      \r

      \r

      // ==========================================\r

      // BASIC RESPONSE VALIDATION\r

      // ==========================================\r

      \r

      pm.test(\"Status code should be 200\", function () {\r

      \r

      \    pm.expect(response.statusCode)\r

      \        .to.eql(200);\r

      \r

      });\r

      \r

      pm.test(\"Success should be Boolean\", function () {\r

      \r

      \    pm.expect(response.success)\r

      \        .to.be.a(\"boolean\");\r

      \r

      });\r

      \r

      pm.test(\"Data should be Object\", function () {\r

      \r

      \    pm.expect(response.data)\r

      \        .to.be.an(\"object\");\r

      \r

      });\r

      \r

      pm.test(\"Error should be null\", function () {\r

      \r

      \    pm.expect(response.error)\r

      \        .to.eql(null);\r

      \r

      });\r

      \r

      \r

      // ==========================================\r

      // TRIP VALIDATION\r

      // ==========================================\r

      \r

      pm.test(\"Trip ID should be valid UUID\", function () {\r

      \r

      \    pm.expect(response.data.id)\r

      \        .to.match(uuidRegex);\r

      \r

      });\r

      \r

      pm.test(\"Trip status should be PICKED\", function () {\r

      \r

      \    pm.expect(response.data.status)\r

      \        .to.eql(\"PICKED\");\r

      \r

      });\r

      \r

      pm.test(\"Trip active should be Boolean\", function () {\r

      \r

      \    pm.expect(response.data.active)\r

      \        .to.be.a(\"boolean\");\r

      \r

      });\r

      \r

      \r

      // ==========================================\r

      // DRIVER VALIDATION\r

      // ==========================================\r

      \r

      pm.test(\"Driver should be Object\", function () {\r

      \r

      \    pm.expect(response.data.driver)\r

      \        .to.be.an(\"object\");\r

      \r

      });\r

      \r

      pm.test(\"Driver ID should be valid UUID\", function () {\r

      \r

      \    pm.expect(response.data.driver.id)\r

      \        .to.match(uuidRegex);\r

      \r

      });\r

      \r

      pm.test(\"Driver status should be BUSY\", function () {\r

      \r

      \    pm.expect(response.data.driver.status)\r

      \        .to.eql(\"BUSY\");\r

      \r

      });\r

      \r

      pm.test(\"Driver active should be true\", function () {\r

      \r

      \    pm.expect(response.data.driver.active)\r

      \        .to.eql(true);\r

      \r

      });\r

      \r

      pm.test(\"Driver deleted should be false\", function () {\r

      \r

      \    pm.expect(response.data.driver.deleted)\r

      \        .to.eql(false);\r

      \r

      });\r

      \r

      pm.test(\"Driver Profile ID should be valid UUID\", function () {\r

      \r

      \    pm.expect(response.data.driver.driverProfileId)\r

      \        .to.match(uuidRegex);\r

      \r

      });\r

      \r

      pm.test(\"Vehicle ID should be valid UUID\", function () {\r

      \r

      \    pm.expect(response.data.driver.vehicleId)\r

      \        .to.match(uuidRegex);\r

      \r

      });\r

      \r

      \r

      // ==========================================\r

      // DRIVER LOCATION VALIDATION\r

      // ==========================================\r

      \r

      pm.test(\"Driver latitude should be Number\", function () {\r

      \r

      \    pm.expect(response.data.driverStartAddress.lat)\r

      \        .to.be.a(\"number\");\r

      \r

      });\r

      \r

      pm.test(\"Driver latitude should be valid\", function () {\r

      \r

      \    pm.expect(response.data.driverStartAddress.lat)\r

      \        .to.be.within(-90, 90);\r

      \r

      });\r

      \r

      pm.test(\"Driver longitude should be Number\", function () {\r

      \r

      \    pm.expect(response.data.driverStartAddress.lng)\r

      \        .to.be.a(\"number\");\r

      \r

      });\r

      \r

      pm.test(\"Driver longitude should be valid\", function () {\r

      \r

      \    pm.expect(response.data.driverStartAddress.lng)\r

      \        .to.be.within(-180, 180);\r

      \r

      });\r

      \r

      \r

      // ==========================================\r

      // PICKED STATUS VALIDATION\r

      // ==========================================\r

      \r

      pm.test(\"Arrived time should not be null\", function () {\r

      \r

      \    pm.expect(response.data.arrivedTime)\r

      \        .to.not.eql(null);\r

      \r

      });\r

      \r

      pm.test(\"Picked time should not be null\", function () {\r

      \r

      \    pm.expect(response.data.pickedTime)\r

      \        .to.not.eql(null);\r

      \r

      });\r

      \r

      pm.test(\"Dropped time should be null\", function () {\r

      \r

      \    pm.expect(response.data.droppedTime)\r

      \        .to.eql(null);\r

      \r

      });\r

      \r

      pm.test(\"Waiting start time should be null\", function () {\r

      \r

      \    pm.expect(response.data.waitingStartAt)\r

      \        .to.eql(null);\r

      \r

      });\r

      \r

      pm.test(\"Arrived time should be valid datetime\", function () {\r

      \r

      \    pm.expect(\r

      \        Date.parse(response.data.arrivedTime)\r

      \    ).to.not.be.NaN;\r

      \r

      });\r

      \r

      pm.test(\"Picked time should be valid datetime\", function () {\r

      \r

      \    pm.expect(\r

      \        Date.parse(response.data.pickedTime)\r

      \    ).to.not.be.NaN;\r

      \r

      });\r

      \r

      pm.test(\"Picked time should be after arrived time\", function () {\r

      \r

      \    const arrived =\r

      \        new Date(response.data.arrivedTime);\r

      \r

      \    const picked =\r

      \        new Date(response.data.pickedTime);\r

      \r

      \    pm.expect(picked >= arrived)\r

      \        .to.eql(true);\r

      \r

      });\r

      \r

      \r

      // ==========================================\r

      // ACTUAL VALUES VALIDATION\r

      // ==========================================\r

      \r

      pm.test(\"Actual time should be Number\", function () {\r

      \r

      \    pm.expect(response.data.actualTime)\r

      \        .to.be.a(\"number\");\r

      \r

      });\r

      \r

      pm.test(\"Actual first mile should be Number\", function () {\r

      \r

      \    pm.expect(response.data.actualFirstMile)\r

      \        .to.be.a(\"number\");\r

      \r

      });\r

      \r

      pm.test(\"Actual first mile duration should be Number\", function () {\r

      \r

      \    pm.expect(response.data.actualFirstMileDuration)\r

      \        .to.be.a(\"number\");\r

      \r

      });\r

      \r

      \r

      // ==========================================\r

      // DATETIME VALIDATION\r

      // ==========================================\r

      \r

      pm.test(\"CreatedAtIST should be valid datetime\", function () {\r

      \r

      \    pm.expect(\r

      \        Date.parse(response.data.createdAtIST)\r

      \    ).to.not.be.NaN;\r

      \r

      });\r

      \r

      pm.test(\"UpdatedAtIST should be valid datetime\", function () {\r

      \r

      \    pm.expect(\r

      \        Date.parse(response.data.updatedAtIST)\r

      \    ).to.not.be.NaN;\r

      \r

      });\r

      \r

      \r

      // ==========================================\r

      // BUSINESS LOGIC VALIDATION\r

      // ==========================================\r

      \r

      pm.test(\"PICKED trip should contain pickedTime\", function () {\r

      \r

      \    if (response.data.status === \"PICKED\") {\r

      \r

      \        pm.expect(response.data.pickedTime)\r

      \            .to.not.eql(null);\r

      \    }\r

      \r

      });\r

      \r

      pm.test(\"PICKED trip driver should be BUSY\", function () {\r

      \r

      \    if (response.data.status === \"PICKED\") {\r

      \r

      \        pm.expect(response.data.driver.status)\r

      \            .to.eql(\"BUSY\");\r

      \    }\r

      \r

      });\r

      \r

      \r

      // ==========================================\r

      // PERFORMANCE VALIDATION\r

      // ==========================================\r

      \r

      pm.test(\"Response time should be below 3000ms\", function () {\r

      \r

      \    pm.expect(pm.response.responseTime)\r

      \        .to.be.below(3000);\r

      \r

      });"
    language: text/javascript
order: 7000
