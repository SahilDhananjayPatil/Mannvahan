$kind: http-request
url: "{{baseUrl}}/trips_new/{{cTripId}}/status"
method: PUT
headers:
  Authorization: "{{cDriver_Token}}"
  Content-Type: application/json
body:
  type: json
  content: |-
    {
        // "status": "ACCEPTED"
        // "status": "PICKED"
        // "status": "DROPPED"
        "status": "ACCEPTED"
    }
scripts:
  - type: beforeRequest
    code: "setTimeout(() => {\r\n}, 10000);"
    language: text/javascript
