      \r

      \r

      // ==========================================\r

      // TC_001 -> success datatype validation\r

      // ==========================================\r

      \r

      pm.test(\"TC_001 - success should be Boolean\", function () {\r

      \r

      \    pm.expect(response.success)\r

      \        .to.be.a(\"boolean\");\r

      \r

      });\r

      \r

      \r

      // ==========================================\r

      // TC_002 -> statusCode validation\r

      // ==========================================\r

      \r

      pm.test(\"TC_002 - statusCode should be 200\", function () {\r

      \r

      \    pm.expect(response.statusCode)\r

      \        .to.eql(200);\r

      \r

      });\r

      \r

      \r

      // ==========================================\r

      // TC_003 -> data object validation\r

      // ==========================================\r

      \r

      pm.test(\"TC_003 - data should be Object\", function () {\r

      \r

      \    pm.expect(response.data)\r

      \        .to.be.an(\"object\");\r

      \r

      });\r

      \r

      \r

      // ==========================================\r

      // TC_004 -> trip id UUID validation\r

      // ==========================================\r

      \r

      pm.test(\"TC_004 - trip id should be valid UUID\", function () {\r

      \r

      \    pm.expect(response.data.id)\r

      \        .to.match(uuidRegex);\r

      \r

      });\r

      \r

      \r

      // ==========================================\r

      // TC_005 -> trip status validation\r

      // ==========================================\r

      \r

      pm.test(\"TC_005 - status should be ACCEPTED\", function () {\r

      \r

      \    pm.expect(response.data.status)\r

      \        .to.eql(\"ACCEPTED\");\r

      \r

      });\r

      \r

      \r

      // ==========================================\r

      // TC_006 -> active datatype validation\r

      // ==========================================\r

      \r

      pm.test(\"TC_006 - active should be Boolean\", function () {\r

      \r

      \    pm.expect(response.data.active)\r

      \        .to.be.a(\"boolean\");\r

      \r

      });\r

      \r

      \r

      // ==========================================\r

      // TC_007 -> driver object validation\r

      // ==========================================\r

      \r

      pm.test(\"TC_007 - driver should be Object\", function () {\r

      \r

      \    pm.expect(response.data.driver)\r

      \        .to.be.an(\"object\");\r

