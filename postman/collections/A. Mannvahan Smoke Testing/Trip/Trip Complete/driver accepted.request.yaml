      \r

      \r

      // ==========================================\r

      // TC_032 -> accepted trip should have driver\r

      // ==========================================\r

      \r

      pm.test(\"TC_032 - ACCEPTED trip should contain driver\", function () {\r

      \r

      \    if (response.data.status === \"ACCEPTED\") {\r

      \r

      \        pm.expect(response.data.driver)\r

