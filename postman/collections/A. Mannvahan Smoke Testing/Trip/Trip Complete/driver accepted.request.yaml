      \r

      pm.test(\"TC_024 - actualTime should be Number\", function () {\r

      \r

      \    pm.expect(response.data.actualTime)\r

      \        .to.be.a(\"number\");\r

      \r

      });\r

      \r

      \r

      // ==========================================\r

      // TC_025 -> actualFirstMile datatype validation\r

      // ==========================================\r

      \r

      pm.test(\"TC_025 - actualFirstMile should be Number\", function () {\r

