      \    }\r

      \r

      });\r

      \r

      \r

      // ==========================================\r

      // TC_033 -> driver should be active\r

      // ==========================================\r

      \r

      pm.test(\"TC_033 - Driver should be active\", function () {\r

      \r

      \    pm.expect(response.data.driver.active)\r

      \        .to.eql(true);\r

