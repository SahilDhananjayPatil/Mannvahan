$kind: http-request
url: "{{baseUrl}}/trips_new/{{cTripId}}/status"
method: PUT
headers:
  Authorization: "{{cDriver_Token}}"
  Content-Type: application/json
body:
  type: json
  content: |-
    {
        // "status": "ACCEPTED"
        // "status": "PICKED"
        // "status": "DROPPED"
        "status": "COMPLETED"  }
scripts:
  - type: afterResponse
    code: "pm.test(\"Status code should be 200\", function () {\r

      \    pm.response.to.have.status(200);\r

      });\r

      \r

      pm.test(\"Response time should be less than 3000ms\", function () {\r

      \    pm.expect(pm.response.responseTime).to.be.below(3000);\r

      });\r

      \r

      pm.test(\"Response should be JSON\", function () {\r

      \    pm.response.to.be.json;\r

      });\r

      \r

      const response = pm.response.json();\r

      \r

      pm.test(\"Success should be true\", function () {\r

      \    pm.expect(response.success).to.eql(true);\r

      });\r

      \r

      pm.test(\"Status code field should be 200\", function () {\r

      \    pm.expect(response.statusCode).to.eql(200);\r

      });\r

      \r

      pm.test(\"Error should be null\", function () {\r

      \    pm.expect(response.error).to.eql(null);\r

      });\r

      \r

      pm.test(\"Data object should not be null\", function () {\r

      \    pm.expect(response.data).to.not.be.null;\r

      });\r

      \r

      pm.test(\"Trip status should be COMPLETED\", function () {\r

      \    pm.expect(response.data.status).to.eql(\"COMPLETED\");\r

      });\r

      \r

      pm.test(\"Trip should be inactive after completion\", function () {\r

      \    pm.expect(response.data.active).to.eql(false);\r

      });\r

      \r

      pm.test(\"Trip ID should exist\", function () {\r

      \    pm.expect(response.data.id).to.not.be.null;\r

      });\r

      \r

      pm.test(\"Trip Request ID should exist\", function () {\r

      \    pm.expect(response.data.tripRequestNew.id).to.not.be.null;\r

      });\r

      \r

      pm.test(\"Vehicle type should be AUTO\", function () {\r

      \    pm.expect(response.data.tripRequestNew.vehicleType)\r

      \        .to.eql(\"AUTO\");\r

      });\r

      \r

      pm.test(\"Trip fare object should exist\", function () {\r

      \    pm.expect(response.data.tripFare).to.not.be.null;\r

      });\r

      \r

      pm.test(\"Total fare should be greater than 0\", function () {\r

      \    pm.expect(response.data.tripFare.totalFare)\r

      \        .to.be.above(0);\r

      });\r

      \r

      pm.test(\"Total fare should be 11747\", function () {\r

      \    pm.expect(response.data.tripFare.totalFare)\r

      \        .to.eql(11747);\r

      });\r

      \r

      pm.test(\"Driver payable should be greater than 0\", function () {\r

      \    pm.expect(response.data.tripFare.driverPayable)\r

      \        .to.be.above(0);\r

      });\r

      \r

      pm.test(\"System payable should be greater than 0\", function () {\r

      \    pm.expect(response.data.tripFare.systemPayable)\r

      \        .to.be.above(0);\r

      });\r

      \r

      pm.test(\"Driver status should be BUSY\", function () {\r

      \    pm.expect(response.data.driver.status)\r

      \        .to.eql(\"BUSY\");\r

      });\r

      \r

      pm.test(\"Driver should be active\", function () {\r

      \    pm.expect(response.data.driver.active)\r

      \        .to.eql(true);\r

      });\r

      \r

      pm.test(\"Arrived time should not be null\", function () {\r

      \    pm.expect(response.data.arrivedTime).to.not.be.null;\r

      });\r

      \r

      pm.test(\"Picked time should not be null\", function () {\r

      \    pm.expect(response.data.pickedTime).to.not.be.null;\r

      });\r

      \r

      pm.test(\"Dropped time should not be null\", function () {\r

      \    pm.expect(response.data.droppedTime).to.not.be.null;\r

      });\r

      \r

      pm.test(\"Actual time should be greater than or equal to 0\", function () {\r

      \    pm.expect(response.data.actualTime)\r

      \        .to.be.at.least(0);\r

      });\r

      \r

      pm.test(\"Actual first mile should be greater than or equal to 0\", function () {\r

      \    pm.expect(response.data.actualFirstMile)\r

      \        .to.be.at.least(0);\r

      });\r

      \r

      pm.test(\"Actual first mile duration should be greater than or equal to 0\", function () {\r

      \    pm.expect(response.data.actualFirstMileDuration)\r

      \        .to.be.at.least(0);\r

      });\r

      \r

      pm.test(\"Polyline should not be empty\", function () {\r

      \    pm.expect(response.data.tripRequestNew.gmapEncodedPolyline.length)\r

      \        .to.be.above(0);\r

      });\r

      \r

      pm.test(\"Fare estimates array should not be empty\", function () {\r

      \    pm.expect(response.data.tripRequestNew.fareEstimatesNew.length)\r

      \        .to.be.above(0);\r

      });\r

      \r

      pm.test(\"Response should contain required root fields\", function () {\r

      \    pm.expect(response).to.have.property(\"success\");\r

      \    pm.expect(response).to.have.property(\"statusCode\");\r

      \    pm.expect(response).to.have.property(\"data\");\r

      \    pm.expect(response).to.have.property(\"error\");\r

      });\r

      \r

      pm.test(\"Response schema validation\", function () {\r

      \r

      \    const schema = {\r

      \        type: \"object\",\r

      \        properties: {\r

      \            success: { type: \"boolean\" },\r

      \            statusCode: { type: \"number\" },\r

      \            data: { type: \"object\" },\r

      \            error: { type: [\"null\", \"object\"] }\r

      \        },\r

      \        required: [\"success\", \"statusCode\", \"data\", \"error\"]\r

      \    };\r

      \r

      \    pm.response.to.have.jsonSchema(schema);\r

      });\r

      \r

      pm.execution.setNextRequest(null);"
    language: text/javascript
order: 11000
